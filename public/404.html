<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Page not found — BottleBrain</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#160308" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&family=Fraunces:ital,opsz,wght@0,9..144,340..640;1,9..144,340..640&display=swap"
      rel="stylesheet"
    />
    <style>
      /* self-contained on purpose — no JS bundle needed for a 404 */
      * { margin: 0; box-sizing: border-box; }
      html { background-color: #160308; } /* overscroll shows the root bg */
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #160308;
        color: #fdfbf8;
        font-family: 'Epilogue', system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .code {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 500;
        font-size: clamp(72px, 14vw, 140px);
        line-height: 1;
        color: #e88ba0;
        font-style: italic;
      }
      h1 {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 500;
        font-size: clamp(24px, 4vw, 34px);
        margin-top: 20px;
      }
      p { margin-top: 12px; color: rgba(253, 251, 248, 0.65); font-size: 16px; line-height: 1.6; }
      a.btn {
        display: inline-block;
        margin-top: 28px;
        padding: 14px 28px;
        border-radius: 9999px;
        background: #fdfbf8;
        color: #2a0a14;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
      }
      a.btn:hover { background: #fff; }
    </style>
  </head>
  <body>
    <main>
      <div class="code" aria-hidden="true">404</div>
      <h1>This shelf is empty.</h1>
      <p>The page you're after isn't in our cellar. Let's walk you back.</p>
      <a class="btn" href="/">Back to BottleBrain</a>
    </main>
  </body>
</html>
